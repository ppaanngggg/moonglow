<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Moonglow - Coming Soon</title>
        <!-- 引入极简 Tailwind 用于基础排版 -->
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <style>
            body {
                /* 深邃夜空背景 */
                background-color: #070a13;
            }

            /* 月亮盈亏动画核心样式 */
            .moon-container {
                position: relative;
                width: 120px;
                height: 120px;
                background-color: #161b26; /* 月亮的阴影面颜色 */
                border-radius: 50%;
                overflow: hidden;
                box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.6);
            }

            /* 亮面光晕 */
            .moon-glow {
                position: absolute;
                inset: 0;
                border-radius: 50%;
                box-shadow: 0 0 40px rgba(253, 244, 215, 0.12);
                pointer-events: none;
            }

            /* 模拟月球亮面的遮罩层 */
            .moon-light {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-color: #fdf4d7; /* 月光温柔的暖白/浅黄色 */
                border-radius: 50%;
                box-shadow: 0 0 15px rgba(253, 244, 215, 0.4);
                animation: moonPhase 12s linear infinite;
            }

            /* 通过 3D 旋转与变形，完美模拟月球的阴晴圆缺 */
            @keyframes moonPhase {
                0% {
                    transform: translateX(-100%) scaleX(1);
                    background-color: #fdf4d7;
                }
                24.9% {
                    background-color: #fdf4d7;
                }
                25% {
                    /* 变成上弦月，亮面开始从右边展开 */
                    transform: translateX(-50%) scaleX(0);
                    background-color: #fdf4d7;
                }
                50% {
                    /* 满月 */
                    transform: translateX(0%) scaleX(1);
                    background-color: #fdf4d7;
                }
                74.9% {
                    background-color: #fdf4d7;
                }
                75% {
                    /* 下弦月，亮面开始向左边收拢 */
                    transform: translateX(50%) scaleX(0);
                    background-color: #161b26; /* 切换为暗色进行遮挡 */
                }
                100% {
                    transform: translateX(100%) scaleX(1);
                    background-color: #161b26;
                }
            }
        </style>
    </head>
    <body
        class="text-gray-400 min-h-screen flex flex-col justify-between items-center font-sans antialiased selection:bg-amber-100 selection:text-gray-900"
    >
        <!-- 顶部留空，平衡视觉 -->
        <div></div>

        <!-- Hero 主体区域 -->
        <main
            class="flex flex-col items-center justify-center text-center px-6"
        >
            <!-- 盈亏月亮复合体 -->
            <div class="relative mb-10">
                <div class="moon-glow"></div>
                <div class="moon-container">
                    <div class="moon-light"></div>
                </div>
            </div>

            <!-- App 名字 -->
            <h1
                class="text-4xl md:text-5xl font-extrabold tracking-widest text-transparent bg-clip-text bg-gradient-to-b from-slate-100 to-slate-300 font-mono mb-4"
            >
                Moonglow
            </h1>

            <!-- 状态提示 -->
            <p
                class="text-xs md:text-sm tracking-[0.3em] uppercase text-amber-200/60 font-semibold mb-2 animate-pulse"
            >
                Coming Soon
            </p>

            <!-- 一句话副标题（可选，可自行修改或删掉） -->
            <p class="text-xs text-gray-600 tracking-wider max-w-xs mt-2">
                宁静夜晚的弱光守护 · 敬请期待
            </p>
        </main>

        <!-- 页脚隐私政策（满足 App 上架审核预备需求） -->
        <footer class="py-8 text-center text-xs text-gray-700 tracking-wide">
            <p>© 2026 Moonglow. 保留所有权利。</p>
        </footer>
    </body>
</html>
