<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Moonglow - Coming Soon</title>
        <!-- Tailwind CSS via CDN -->
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <style>
            body {
                /* Deep night sky background */
                background-color: #070a13;
            }

            #moonSvg {
                width: min(128vw, 480px);
                height: min(128vw, 480px);
                display: block;
            }
        </style>
    </head>
    <body
        class="text-gray-400 min-h-screen flex flex-col justify-between items-center font-sans antialiased selection:bg-amber-100 selection:text-gray-900"
    >
        <!-- Top spacer for visual balance -->
        <div></div>

        <!-- Hero section -->
        <main
            class="flex flex-col items-center justify-center text-center px-6"
        >
            <!-- Moon phase composite -->
            <div class="relative mb-10">
                <svg
                    id="moonSvg"
                    viewBox="0 0 360 360"
                    xmlns="http://www.w3.org/2000/svg"
                >
                    <defs>
                        <radialGradient
                            id="moonBody"
                            cx="187.2"
                            cy="171"
                            r="57"
                            gradientUnits="userSpaceOnUse"
                        >
                            <stop
                                offset="0%"
                                stop-color="#FFFFFF"
                                stop-opacity="0.98"
                            />
                            <stop
                                offset="35%"
                                stop-color="#FFF5E8"
                                stop-opacity="0.92"
                            />
                            <stop
                                offset="100%"
                                stop-color="#FFD080"
                                stop-opacity="0.8"
                            />
                        </radialGradient>
                        <radialGradient
                            id="glow1"
                            cx="180"
                            cy="180"
                            r="69"
                            gradientUnits="userSpaceOnUse"
                        >
                            <stop
                                offset="0%"
                                stop-color="#FFB050"
                                stop-opacity="0.28"
                            />
                            <stop
                                offset="100%"
                                stop-color="#FFB050"
                                stop-opacity="0"
                            />
                        </radialGradient>
                        <radialGradient
                            id="glow2"
                            cx="180"
                            cy="180"
                            r="96"
                            gradientUnits="userSpaceOnUse"
                        >
                            <stop
                                offset="0%"
                                stop-color="#FFB050"
                                stop-opacity="0.14"
                            />
                            <stop
                                offset="100%"
                                stop-color="#FFB050"
                                stop-opacity="0"
                            />
                        </radialGradient>
                        <radialGradient
                            id="glow3"
                            cx="180"
                            cy="180"
                            r="144"
                            gradientUnits="userSpaceOnUse"
                        >
                            <stop
                                offset="0%"
                                stop-color="#FF7700"
                                stop-opacity="0.08"
                            />
                            <stop
                                offset="100%"
                                stop-color="#FF7700"
                                stop-opacity="0"
                            />
                        </radialGradient>
                        <radialGradient
                            id="glow4"
                            cx="180"
                            cy="180"
                            r="228"
                            gradientUnits="userSpaceOnUse"
                        >
                            <stop
                                offset="0%"
                                stop-color="#FF7700"
                                stop-opacity="0.04"
                            />
                            <stop
                                offset="100%"
                                stop-color="#FF7700"
                                stop-opacity="0"
                            />
                        </radialGradient>
                    </defs>
                    <circle
                        id="mg4"
                        cx="180"
                        cy="180"
                        r="228"
                        fill="url(#glow4)"
                    />
                    <circle
                        id="mg3"
                        cx="180"
                        cy="180"
                        r="144"
                        fill="url(#glow3)"
                    />
                    <circle
                        id="mg2"
                        cx="180"
                        cy="180"
                        r="96"
                        fill="url(#glow2)"
                    />
                    <circle
                        id="mg1"
                        cx="180"
                        cy="180"
                        r="69"
                        fill="url(#glow1)"
                    />
                    <path id="moonPath" d="" fill="url(#moonBody)" />
                </svg>
            </div>

            <script>
                (function () {
                    var CX = 180,
                        CY = 180,
                        R = 60;
                    var CYCLE = 12000;
                    var moonEl = document.getElementById("moonPath");
                    var gStops = [
                        {
                            el: document.querySelector(
                                "#glow1 stop:first-child",
                            ),
                            base: 0.28,
                        },
                        {
                            el: document.querySelector(
                                "#glow2 stop:first-child",
                            ),
                            base: 0.14,
                        },
                        {
                            el: document.querySelector(
                                "#glow3 stop:first-child",
                            ),
                            base: 0.08,
                        },
                        {
                            el: document.querySelector(
                                "#glow4 stop:first-child",
                            ),
                            base: 0.04,
                        },
                    ];
                    var g1El = document.getElementById("mg1");

                    function moonPath(phase) {
                        if (phase >= 0.999) {
                            return (
                                "M " +
                                CX +
                                " " +
                                (CY - R) +
                                " A " +
                                R +
                                " " +
                                R +
                                " 0 1 1 " +
                                CX +
                                " " +
                                (CY + R) +
                                " A " +
                                R +
                                " " +
                                R +
                                " 0 1 1 " +
                                CX +
                                " " +
                                (CY - R) +
                                " Z"
                            );
                        }
                        if (phase <= 0.001) return "M " + CX + " " + CY + " Z";
                        var b = R * (2 * phase - 1);
                        var rx = Math.max(Math.abs(b), 0.01).toFixed(2);
                        var sw = b >= 0 ? 1 : 0;
                        return (
                            "M " +
                            CX +
                            " " +
                            (CY - R) +
                            " A " +
                            R +
                            " " +
                            R +
                            " 0 1 1 " +
                            CX +
                            " " +
                            (CY + R) +
                            " A " +
                            rx +
                            " " +
                            R +
                            " 0 0 " +
                            sw +
                            " " +
                            CX +
                            " " +
                            (CY - R) +
                            " Z"
                        );
                    }

                    var start = null;
                    function frame(ts) {
                        if (!start) start = ts;
                        var t = ((ts - start) % CYCLE) / CYCLE;
                        // Triangle wave: 0 → 1 → 0 (new → full → new)
                        var phase = 1 - Math.abs(2 * t - 1);
                        var gs = Math.pow(phase, 0.5);

                        moonEl.setAttribute("d", moonPath(phase));
                        moonEl.style.display = phase > 0.02 ? "" : "none";
                        g1El.style.display = phase > 0.02 ? "" : "none";

                        for (var i = 0; i < gStops.length; i++) {
                            gStops[i].el.setAttribute(
                                "stop-opacity",
                                (gStops[i].base * gs).toFixed(4),
                            );
                        }

                        requestAnimationFrame(frame);
                    }
                    requestAnimationFrame(frame);
                })();
            </script>

            <!-- App name -->
            <h1
                class="text-4xl md:text-5xl font-extrabold tracking-widest text-transparent bg-clip-text bg-gradient-to-b from-slate-100 to-slate-300 font-mono mb-4"
            >
                Moonglow
            </h1>

            <!-- Status badge -->
            <p
                class="text-xs md:text-sm tracking-[0.3em] uppercase text-amber-200/60 font-semibold mb-2 animate-pulse"
            >
                Coming Soon
            </p>

            <!-- Tagline -->
            <p class="text-xs text-gray-600 tracking-wider max-w-xs mt-2">
                Gentle light for quiet nights · Stay tuned
            </p>
        </main>

        <!-- Footer -->
        <footer
            class="w-full py-8 text-center text-xs text-gray-700 tracking-wide border-t border-gray-800/50"
        >
            <nav class="mb-3 space-x-6">
                <a
                    href="index.html"
                    class="text-amber-200/60 hover:text-amber-200 transition-colors"
                    >Home</a
                >
                <a
                    href="privacy.html"
                    class="hover:text-gray-500 transition-colors"
                    >Privacy</a
                >
                <a
                    href="terms.html"
                    class="hover:text-gray-500 transition-colors"
                    >Terms</a
                >
            </nav>
            <p>© 2026 Moonglow. All rights reserved.</p>
        </footer>
    </body>
</html>
