<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Moonglow - Coming Soon</title>
        <!-- Tailwind CSS via CDN -->
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <style>
            body {
                /* Deep night sky background */
                background-color: #070a13;
            }

            /* Moon phase animation core styles */
            .moon-container {
                position: relative;
                width: 120px;
                height: 120px;
                background-color: #161b26; /* Moon shadow side */
                border-radius: 50%;
                overflow: hidden;
                box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.6);
            }

            /* Light side glow */
            .moon-glow {
                position: absolute;
                inset: 0;
                border-radius: 50%;
                box-shadow: 0 0 40px rgba(253, 244, 215, 0.12);
                pointer-events: none;
            }

            /* Mask layer simulating the lit side of the moon */
            .moon-light {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-color: #fdf4d7; /* Warm moonlight */
                border-radius: 50%;
                box-shadow: 0 0 15px rgba(253, 244, 215, 0.4);
                animation: moonPhase 12s linear infinite;
            }

            /* Moon phase animation via translateX and scaleX */
            @keyframes moonPhase {
                0% {
                    transform: translateX(-100%) scaleX(1);
                    background-color: #fdf4d7;
                }
                24.9% {
                    background-color: #fdf4d7;
                }
                25% {
                    /* Waxing crescent — lit side expands from the right */
                    transform: translateX(-50%) scaleX(0);
                    background-color: #fdf4d7;
                }
                50% {
                    /* Full moon */
                    transform: translateX(0%) scaleX(1);
                    background-color: #fdf4d7;
                }
                74.9% {
                    background-color: #fdf4d7;
                }
                75% {
                    /* Waning crescent — lit side recedes to the left */
                    transform: translateX(50%) scaleX(0);
                    background-color: #161b26; /* Switch to dark for occlusion */
                }
                100% {
                    transform: translateX(100%) scaleX(1);
                    background-color: #161b26;
                }
            }
        </style>
    </head>
    <body
        class="text-gray-400 min-h-screen flex flex-col justify-between items-center font-sans antialiased selection:bg-amber-100 selection:text-gray-900"
    >
        <!-- Top spacer for visual balance -->
        <div></div>

        <!-- Hero section -->
        <main
            class="flex flex-col items-center justify-center text-center px-6"
        >
            <!-- Moon phase composite -->
            <div class="relative mb-10">
                <div class="moon-glow"></div>
                <div class="moon-container">
                    <div class="moon-light"></div>
                </div>
            </div>

            <!-- App name -->
            <h1
                class="text-4xl md:text-5xl font-extrabold tracking-widest text-transparent bg-clip-text bg-gradient-to-b from-slate-100 to-slate-300 font-mono mb-4"
            >
                Moonglow
            </h1>

            <!-- Status badge -->
            <p
                class="text-xs md:text-sm tracking-[0.3em] uppercase text-amber-200/60 font-semibold mb-2 animate-pulse"
            >
                Coming Soon
            </p>

            <!-- Tagline -->
            <p class="text-xs text-gray-600 tracking-wider max-w-xs mt-2">
                Gentle light for quiet nights · Stay tuned
            </p>
        </main>

        <!-- Footer -->
        <footer
            class="w-full py-8 text-center text-xs text-gray-700 tracking-wide border-t border-gray-800/50"
        >
            <nav class="mb-3 space-x-6">
                <a
                    href="index.html"
                    class="text-amber-200/60 hover:text-amber-200 transition-colors"
                    >Home</a
                >
                <a
                    href="privacy.html"
                    class="hover:text-gray-500 transition-colors"
                    >Privacy</a
                >
                <a
                    href="terms.html"
                    class="hover:text-gray-500 transition-colors"
                    >Terms</a
                >
            </nav>
            <p>© 2026 Moonglow. All rights reserved.</p>
        </footer>
    </body>
</html>
