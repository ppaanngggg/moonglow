        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                background: #030508;
                display: flex;
                justify-content: center;
                padding: 24px;
                min-height: 100vh;
            }

            #canvas {
                width: 1242px;
                height: 2688px;
                position: relative;
                overflow: hidden;
                flex-shrink: 0;
                background:
                    radial-gradient(
                        ellipse 900px 700px at 72% 10%,
                        rgba(253, 244, 215, 0.07) 0%,
                        transparent 100%
                    ),
                    radial-gradient(
                        ellipse 500px 400px at 20% 75%,
                        rgba(80, 100, 160, 0.05) 0%,
                        transparent 100%
                    ),
                    linear-gradient(
                        180deg,
                        #060910 0%,
                        #0a0f1c 25%,
                        #0d1322 55%,
                        #0a0e18 100%
                    );
            }

            /* ── Stars ──────────────────────────────────────── */
            .stars {
                position: absolute;
                inset: 0;
                pointer-events: none;
            }
            .stars svg {
                width: 100%;
                height: 100%;
            }

            /* ── Text ───────────────────────────────────────── */
            .text-area {
                position: relative;
                z-index: 10;
                padding: 170px 80px 0;
                text-align: center;
            }
            .text-area h1 {
                font-family:
                    ui-monospace, "SF Mono", "Cascadia Code", "Fira Code",
                    monospace;
                font-size: 96px;
                font-weight: 800;
                letter-spacing: 0.14em;
                line-height: 1.12;
                color: #f1f5f9;
                margin-bottom: 36px;
            }
            .text-area p {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui,
                    sans-serif;
                font-size: 46px;
                font-weight: 300;
                color: rgba(253, 244, 215, 0.65);
                line-height: 1.6;
                letter-spacing: 0.03em;
                max-width: 960px;
                margin: 0 auto;
            }

            /* ── Phone Mock ─────────────────────────────────── */
            .screenshot-wrap {
                position: absolute;
                bottom: 90px;
                left: 50%;
                transform: translateX(-50%);
            }
            .phone-frame {
                position: relative;
                width: 945px; /* 905 + 20px padding each side */
                border-radius: 58px;
                background: linear-gradient(
                    160deg,
                    #2a2a2e 0%,
                    #1a1a1e 30%,
                    #0f0f12 70%,
                    #1e1e22 100%
                );
                padding: 20px;
                box-shadow:
                    /* outer depth */
                    0 40px 100px rgba(0, 0, 0, 0.6),
                    0 0 0 1px rgba(255, 255, 255, 0.04),
                    0 -1px 0 rgba(253, 244, 215, 0.06),
                    inset 0 1px 0 rgba(255, 255, 255, 0.05),
                    inset 0 -1px 0 rgba(0, 0, 0, 0.3);
            }
            /* Side buttons */
            .phone-frame::before {
                content: "";
                position: absolute;
                /* right side — power button */
                right: -3px;
                top: 280px;
                width: 4px;
                height: 90px;
                border-radius: 0 3px 3px 0;
                background: linear-gradient(180deg, #333 0%, #1a1a1a 100%);
                box-shadow:
                    0 140px 0 #252525,
                    0 140px 0 1px rgba(255, 255, 255, 0.03);
            }
            .phone-frame::after {
                content: "";
                position: absolute;
                /* left side — volume buttons */
                left: -3px;
                top: 240px;
                width: 4px;
                height: 55px;
                border-radius: 3px 0 0 3px;
                background: linear-gradient(180deg, #333 0%, #1a1a1a 100%);
                box-shadow:
                    0 80px 0 #252525,
                    0 80px 0 1px rgba(255, 255, 255, 0.03),
                    0 160px 0 #252525,
                    0 160px 0 1px rgba(255, 255, 255, 0.03);
            }
            .phone-screen {
                border-radius: 40px;
                overflow: hidden;
                background: #000;
            }
            .phone-screen img {
                display: block;
                width: 905px; /* 1206 × 0.75 */
                height: auto;
            }
            /* Dynamic Island notch */
            .phone-notch {
                position: absolute;
                top: 30px;
                left: 50%;
                transform: translateX(-50%);
                width: 120px;
                height: 34px;
                background: #000;
                border-radius: 20px;
                z-index: 20;
            }
        </style>
